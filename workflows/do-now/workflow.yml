# Ralph loop (https://github.com/snarktank/ralph) — fresh context per agent session
id: do-now
name: Do Now
version: 1
description: |
  Submit any task to a single agent for immediate execution and a structured success/failure report.
  Simple single-agent workflow. Submit any task and get back a success/failure
  report with a clear explanation. No planning, no stories, no merge — just do it
  and report back.

agents:
  - id: doer
    name: Doer
    role: coding
    description: Executes arbitrary tasks and reports success or failure with a
      clear reason.
    workspace:
      baseDir: agents/doer
      skills:
        - tamandua-agents
      files:
        AGENTS.md: agents/doer/AGENTS.md
        SOUL.md: agents/doer/SOUL.md
        IDENTITY.md: agents/doer/IDENTITY.md

steps:
  - id: execute
    agent: doer
    input: |
      Execute the following task and report your results.

      TASK:
      {{task}}

      RETRY FEEDBACK (only present if your previous attempt was rejected — read carefully and fix specifically what it complains about):
      {{retry_feedback}}

      Instructions:
      1. Understand the task
      2. Complete the task to the best of your ability
      3. Report whether you succeeded or failed
      4. Explain why — provide specific, actionable details

      Reply with:
      STATUS: done
      REPORT: clear explanation of what happened and why (succeeded or failed)
    expects: "STATUS: done"
    max_retries: 4
