<!DOCTYPE html>
<html lang="en" data-theme="canarinho">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflows — Canarinho VibeCoder</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
  <link rel="stylesheet" href="/dashboard-ui.css">
</head>
<body>
  <header>
    <img class="brand-logo" src="/brand-logo.png" alt="Canarinho VibeCoder" style="height:28px;width:auto;">
    <h1 class="brand-text"><a href="/" style="color:inherit;text-decoration:none;">Canarinho VibeCoder</a></h1>
    <span class="subtitle">Workflows</span>
    <span class="status-dot" id="status-dot" title="Connected"></span>
  </header>

  <div class="container">
    <section class="section">
      <h2>All Workflows</h2>
      <div id="workflows-content">
        <div class="empty-state">Loading...</div>
      </div>
    </section>

    <p class="refresh-info">
      <a href="/" style="color:var(--ink-soft);">← Back to Dashboard</a>
    </p>
  </div>

  <script>
    (function() {
      var html = document.documentElement;
      var theme = localStorage.getItem('tamandua-theme') || 'canarinho';
      html.setAttribute('data-theme', theme);
    })();
  </script>
  <script>
    (function() {
      var el = document.getElementById('workflows-content');

      function esc(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function statusBadge(status) {
        var map = {
          running: 'badge-running',
          completed: 'badge-completed',
          failed: 'badge-failed',
          canceled: 'badge-canceled',
          paused: 'badge-paused'
        };
        return '<span class="badge ' + (map[status] || 'badge-running') + '">' + status + '</span>';
      }

      function timeAgo(ts) {
        if (!ts) return '—';
        var diff = Date.now() - new Date(ts).getTime();
        var mins = Math.floor(diff / 60000);
        if (mins < 1) return 'just now';
        if (mins < 60) return mins + 'm ago';
        var hours = Math.floor(mins / 60);
        if (hours < 24) return hours + 'h ago';
        return Math.floor(hours / 24) + 'd ago';
      }

      fetch('/api/workflows')
        .then(function(r) {
          if (!r.ok) throw new Error(r.statusText);
          return r.json();
        })
        .then(function(data) {
          if (!data.workflows || !data.workflows.length) {
            el.innerHTML = '<div class="empty-state">No workflows found</div>';
            return;
          }

          var rows = data.workflows.map(function(w) {
            var lastRun = w.latest_run ? timeAgo(w.latest_run) : '—';
            var activeHtml = '';
            if (w.running_count) activeHtml += '<span style="color:var(--blue);font-size:11px;">' + w.running_count + ' running</span> ';
            if (w.paused_count) activeHtml += '<span style="color:var(--yellow);font-size:11px;">' + w.paused_count + ' paused</span> ';
            if (w.failed_count) activeHtml += '<span style="color:var(--red);font-size:11px;">' + w.failed_count + ' failed</span>';
            if (!w.running_count && !w.paused_count && !w.failed_count && w.run_count > 0) activeHtml = '<span style="color:var(--ink-soft);font-size:11px;">all completed</span>';
            if (!w.run_count) activeHtml = '<span style="color:var(--ink-soft);font-size:11px;">—</span>';
            var installBadge = w.installed
              ? '<span style="color:var(--green);font-size:11px;">installed</span>'
              : '<span style="color:var(--ink-soft);font-size:11px;">bundled</span>';
            return '<tr>' +
              '<td><span class="mono" style="color:var(--ink-strong);">' + esc(w.id) + '</span></td>' +
              '<td style="max-width:320px;">' + esc(w.description || w.id) + '</td>' +
              '<td>' + installBadge + '</td>' +
              '<td class="num">' + w.run_count + '</td>' +
              '<td>' + (w.active_status ? statusBadge(w.active_status) : '<span style="color:var(--ink-soft);">—</span>') + '</td>' +
              '<td class="num" style="font-size:11px">' + lastRun + '</td>' +
              '<td>' + activeHtml + '</td>' +
            '</tr>';
          }).join('');

          el.innerHTML = '<table class="runs-table"><thead><tr>' +
            '<th>Workflow</th><th>Description</th><th>Status</th><th>Runs</th><th>Latest</th><th>Last Run</th><th>Active</th>' +
          '</tr></thead><tbody>' + rows + '</tbody></table>';
        })
        .catch(function(err) {
          el.innerHTML = '<div class="error-state">Failed to load workflows: ' + esc(err.message) + '</div>';
        });
    })();
  </script>
</body>
</html>
